name: zien_mobile
description: ZIEN Platform - Unified mobile app
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # Auth & Backend
  supabase_flutter: ^2.8.3
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^15.1.2

  # UI
  flutter_svg: ^2.0.16
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Storage
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.3.1
  http: ^1.2.2

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.4
  build_runner: ^2.4.14

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/i18n/
