name = "zien-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Routes: api.plt.zien-ai.app/*
routes = [
  { pattern = "api.plt.zien-ai.app", custom_domain = true }
]

[vars]
ENVIRONMENT = "production"
SUPABASE_URL = "https://rjrgylhcpnijkfstvcza.supabase.co"

