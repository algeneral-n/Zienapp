<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">
  <defs>
    <linearGradient id="zg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8FAABB"/>
      <stop offset="100%" stop-color="#6B8EA0"/>
    </linearGradient>
  </defs>
  
  <!-- Z Letter Body -->
  <g transform="translate(20, 20)">
    <!-- Top horizontal bar -->
    <rect x="15" y="15" width="170" height="26" rx="6" fill="url(#zg)"/>
    <!-- Diagonal bar -->
    <rect x="50" y="15" width="26" height="190" rx="6" fill="url(#zg)" transform="rotate(-32 115 110)"/>
    <!-- Bottom horizontal bar -->
    <rect x="15" y="159" width="170" height="26" rx="6" fill="url(#zg)"/>
    
    <!-- Circuit nodes -->
    <circle cx="15" cy="28" r="11" fill="url(#zg)"/>
    <circle cx="15" cy="28" r="5.5" fill="#ffffff" opacity="0.3"/>
    
    <circle cx="185" cy="28" r="11" fill="url(#zg)"/>
    <circle cx="185" cy="28" r="5.5" fill="#ffffff" opacity="0.3"/>
    
    <circle cx="35" cy="105" r="9" fill="url(#zg)"/>
    <circle cx="35" cy="105" r="4.5" fill="#ffffff" opacity="0.3"/>
    
    <circle cx="100" cy="90" r="9" fill="url(#zg)"/>
    <circle cx="100" cy="90" r="4.5" fill="#ffffff" opacity="0.3"/>
    
    <circle cx="15" cy="172" r="11" fill="url(#zg)"/>
    <circle cx="15" cy="172" r="5.5" fill="#ffffff" opacity="0.3"/>
    
    <circle cx="185" cy="172" r="11" fill="url(#zg)"/>
    <circle cx="185" cy="172" r="5.5" fill="#ffffff" opacity="0.3"/>
    
    <!-- Connection lines -->
    <line x1="15" y1="39" x2="35" y2="96" stroke="#8FAABB" stroke-width="2.5" opacity="0.5"/>
    <line x1="35" y1="105" x2="100" y2="90" stroke="#8FAABB" stroke-width="2.5" opacity="0.5"/>
    <line x1="35" y1="114" x2="15" y2="161" stroke="#8FAABB" stroke-width="2.5" opacity="0.5"/>
    <line x1="100" y1="99" x2="185" y2="161" stroke="#8FAABB" stroke-width="2.5" opacity="0.5"/>
  </g>
</svg>
