<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2DD4A8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14B8A6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shadow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.15" />
    </linearGradient>
  </defs>
  <!-- Circle background -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Long shadow -->
  <path d="M330 140 L410 220 L256 512 C120 500 30 400 10 280 Z" fill="url(#shadow)" opacity="0.3"/>
  <!-- Z letter - white with subtle crystal effect -->
  <path d="M150 140 L362 140 L362 185 L225 340 L362 340 L362 385 L150 385 L150 340 L287 185 L150 185 Z" 
        fill="#FFFFFF" opacity="0.95"/>
  <!-- Crystal highlight on Z -->
  <path d="M150 140 L362 140 L362 185 L287 185 L150 185 Z" 
        fill="#FFFFFF" opacity="0.15"/>
</svg>
