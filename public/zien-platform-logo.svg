<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" fill="none">
  <defs>
    <linearGradient id="zg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8FAABB"/>
      <stop offset="100%" stop-color="#6B8EA0"/>
    </linearGradient>
  </defs>
  
  <!-- Z Letter Body -->
  <g transform="translate(30, 20)">
    <!-- Top horizontal bar -->
    <rect x="20" y="20" width="160" height="28" rx="6" fill="url(#zg)"/>
    <!-- Diagonal bar -->
    <rect x="50" y="20" width="28" height="200" rx="6" fill="url(#zg)" transform="rotate(-32 130 120)"/>
    <!-- Bottom horizontal bar -->
    <rect x="20" y="192" width="160" height="28" rx="6" fill="url(#zg)"/>
    
    <!-- Circuit connection nodes (circles) -->
    <!-- Top-left node -->
    <circle cx="20" cy="34" r="12" fill="url(#zg)"/>
    <circle cx="20" cy="34" r="6" fill="#ffffff" opacity="0.3"/>
    
    <!-- Top-right node -->
    <circle cx="180" cy="34" r="12" fill="url(#zg)"/>
    <circle cx="180" cy="34" r="6" fill="#ffffff" opacity="0.3"/>
    
    <!-- Middle-left node -->
    <circle cx="38" cy="130" r="10" fill="url(#zg)"/>
    <circle cx="38" cy="130" r="5" fill="#ffffff" opacity="0.3"/>
    
    <!-- Middle node -->
    <circle cx="100" cy="110" r="10" fill="url(#zg)"/>
    <circle cx="100" cy="110" r="5" fill="#ffffff" opacity="0.3"/>
    
    <!-- Bottom-left node -->
    <circle cx="20" cy="206" r="12" fill="url(#zg)"/>
    <circle cx="20" cy="206" r="6" fill="#ffffff" opacity="0.3"/>
    
    <!-- Bottom-right node -->
    <circle cx="180" cy="206" r="12" fill="url(#zg)"/>
    <circle cx="180" cy="206" r="6" fill="#ffffff" opacity="0.3"/>
    
    <!-- Connection lines between nodes -->
    <line x1="20" y1="46" x2="38" y2="120" stroke="#8FAABB" stroke-width="3" opacity="0.5"/>
    <line x1="38" y1="130" x2="100" y2="110" stroke="#8FAABB" stroke-width="3" opacity="0.5"/>
    <line x1="38" y1="140" x2="20" y2="194" stroke="#8FAABB" stroke-width="3" opacity="0.5"/>
    <line x1="100" y1="120" x2="180" y2="194" stroke="#8FAABB" stroke-width="3" opacity="0.5"/>
  </g>
  
  <!-- "ZIEN" Text -->
  <text x="280" y="140" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="100" font-weight="800" letter-spacing="8" fill="#7B98AD">ZIEN</text>
  
  <!-- "PLATFORM" Text -->
  <text x="283" y="200" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="48" font-weight="600" letter-spacing="18" fill="#7B98AD" opacity="0.75">PLATFORM</text>
</svg>
